<app-page-header title="My Insights" subtitle="Understand your spending habits"></app-page-header>

<div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
    <app-stat-card label="This Month" value="$31.50" icon="calendar_today" iconColor="#635BFF"
        iconBg="rgba(99,91,255,0.1)"></app-stat-card>
    <app-stat-card label="Top Category" value="Entertainment" icon="movie" iconColor="#E74C3C"
        iconBg="rgba(231,76,60,0.1)"></app-stat-card>
    <app-stat-card label="Avg. Spending/Week" value="$13.25" icon="analytics" iconColor="#F39C12"
        iconBg="rgba(243,156,18,0.1)"></app-stat-card>
</div>

<div class="charts-row">
    <div class="chart-card">
        <h3>Spending by Category</h3>
        <div class="chart-container" style="height: 240px;">
            <canvas baseChart [data]="categoryData" [options]="pieOptions" type="doughnut"></canvas>
        </div>
    </div>
    <div class="chart-card">
        <h3>Weekly Spending</h3>
        <div class="chart-container" style="height: 240px;">
            <canvas baseChart [data]="weeklyData" [options]="chartOptions" type="bar"></canvas>
        </div>
    </div>
</div>

<div class="charts-row" style="grid-template-columns: 1fr;">
    <div class="chart-card">
        <h3>Monthly Spending Trend</h3>
        <div class="chart-container">
            <canvas baseChart [data]="trendData" [options]="chartOptions" type="line"></canvas>
        </div>
    </div>
</div>
