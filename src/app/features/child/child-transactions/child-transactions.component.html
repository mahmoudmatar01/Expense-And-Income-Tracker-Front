<app-page-header title="My Transactions" subtitle="View your spending history"></app-page-header>

<app-data-table [columns]="columns" [data]="transactions" [searchable]="true"
    searchPlaceholder="Search transactions..."
    [isLoading]="isLoading" emptyIcon="receipt_long" emptyTitle="No transactions yet"
    emptyMessage="You haven't made any transactions.">
</app-data-table>

<!-- Pagination Control -->
<div
    style="display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1rem; padding: 0 1rem;">
    <button class="btn-outline" (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
    <span style="font-size: 0.875rem;">Page {{ currentPage + 1 }} of {{ totalPages === 0 ? 1 : totalPages }}</span>
    <button class="btn-outline" (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">Next</button>
</div>

<button class="fab" (click)="openModal()" title="Add Transaction">
    <span class="material-icons">add</span>
</button>

<app-modal [isOpen]="showModal" title="Add Transaction" (close)="showModal = false">
    <form [formGroup]="txnForm" (ngSubmit)="submitTransaction()">

        <div class="form-row">

            <!-- UPDATED FIELD -->
            <div class="form-group">
                <label class="form-label">Transaction Type</label>
                <input class="form-control" value="Expense" readonly />
            </div>

            <div class="form-group">
                <label class="form-label">Amount ($)</label>
                <input class="form-control" type="number" formControlName="amount" placeholder="0.00"
                    [class.is-invalid]="txnForm.get('amount')?.invalid && txnForm.get('amount')?.touched" />

                <div class="text-danger"
                    *ngIf="txnForm.get('amount')?.invalid && txnForm.get('amount')?.touched"
                    style="font-size: 12px; margin-top: 4px; color: var(--color-danger);">
                    Amount must be greater than 0
                </div>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label class="form-label">Wallet</label>

                <select class="form-control"
                        formControlName="walletId"
                        [class.is-invalid]="txnForm.get('walletId')?.invalid && txnForm.get('walletId')?.touched">

                    <option [ngValue]="null">Select Wallet</option>

                    <option *ngFor="let w of wallets"
                            [ngValue]="w.walletId">
                        {{ w.walletName }}
                    </option>

                </select>

                <div class="text-danger"
                    *ngIf="txnForm.get('walletId')?.invalid && txnForm.get('walletId')?.touched"
                    style="font-size: 12px; margin-top: 4px; color: var(--color-danger);">
                    Wallet is required
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>

                <select class="form-control"
                        formControlName="categoryId"
                        [class.is-invalid]="txnForm.get('categoryId')?.invalid && txnForm.get('categoryId')?.touched">

                    <option [ngValue]="null">Select Category</option>

                    <option *ngFor="let cat of categories"
                            [ngValue]="cat.id">
                        {{ cat.name }}
                    </option>

                </select>

                <div class="text-danger"
                    *ngIf="txnForm.get('categoryId')?.invalid && txnForm.get('categoryId')?.touched"
                    style="font-size: 12px; margin-top: 4px; color: var(--color-danger);">
                    Category is required for expenses
                </div>
            </div>

        </div>

        <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <input class="form-control"
                   formControlName="description"
                   placeholder="What was this for?" />
        </div>

        <div class="form-actions" style="margin-top: 2rem;">
            <button type="button" class="btn-outline" (click)="showModal = false">Cancel</button>
            <button type="submit"
                    class="btn btn-primary"
                    [disabled]="txnForm.invalid">
                Save Transaction
            </button>
        </div>

    </form>
</app-modal>
