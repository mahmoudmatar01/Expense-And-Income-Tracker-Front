<app-page-header title="Settings" subtitle="Platform configuration and security options">
    <button class="btn btn-primary" (click)="save()">
        <span class="material-icons" style="font-size: 18px;">save</span>
        Save Changes
    </button>
</app-page-header>

<div class="two-col-layout">
    <div class="chart-card">
        <h3>Platform Configuration</h3>
        <div class="form-group">
            <label class="form-label">Platform Name</label>
            <input class="form-control" [(ngModel)]="platformName" />
        </div>
        <div class="form-group">
            <label class="form-label">Max Children per Parent</label>
            <input class="form-control" type="number" [(ngModel)]="maxChildrenPerParent" />
        </div>
        <div class="form-group">
            <label class="form-label">Default Currency</label>
            <select class="form-control" [(ngModel)]="defaultCurrency">
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - British Pound</option>
            </select>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
            <input type="checkbox" id="notifications" [(ngModel)]="enableNotifications"
                style="width: 18px; height: 18px; accent-color: var(--color-primary);">
            <label for="notifications" style="font-size: 0.875rem; font-weight: 500;">Enable Email Notifications</label>
        </div>
    </div>

    <div class="chart-card">
        <h3>Security Options</h3>
        <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
            <input type="checkbox" id="2fa" [(ngModel)]="twoFactorRequired"
                style="width: 18px; height: 18px; accent-color: var(--color-primary);">
            <label for="2fa" style="font-size: 0.875rem; font-weight: 500;">Require Two-Factor Authentication</label>
        </div>
        <div class="form-group">
            <label class="form-label">Session Timeout (minutes)</label>
            <input class="form-control" type="number" [(ngModel)]="sessionTimeout" />
        </div>
        <div class="form-group">
            <label class="form-label">Max Login Attempts</label>
            <input class="form-control" type="number" [(ngModel)]="maxLoginAttempts" />
        </div>
    </div>
</div>
