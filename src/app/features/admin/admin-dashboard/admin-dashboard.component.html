<app-page-header title="Dashboard Overview" subtitle="Monitor platform activity and system health"></app-page-header>

<div class="stats-grid">
    <app-stat-card label="Total Users" [value]="overview.totalUsers.toString()" icon="group" iconColor="#635BFF"
        iconBg="rgba(99,91,255,0.1)"></app-stat-card>
    <app-stat-card label="Active Parents" [value]="overview.activeParents.toString()" icon="person" iconColor="#2ECC71"
        iconBg="rgba(46,204,113,0.1)"></app-stat-card>
    <app-stat-card label="Active Children" [value]="overview.activeChildren.toString()" icon="child_care"
        iconColor="#F39C12" iconBg="rgba(243,156,18,0.1)"></app-stat-card>
    <app-stat-card label="Total Transactions" [value]="'$' + (overview.totalTransactionAmount | number:'1.2-2')"
        icon="swap_horiz" iconColor="#E74C3C" iconBg="rgba(231,76,60,0.1)"></app-stat-card>
</div>

<div class="charts-row">
    <div class="chart-card" *ngIf="barChartData">
        <h3>User Registrations</h3>
        <div class="chart-container">
            <canvas baseChart [data]="barChartData" [options]="chartOptions" type="bar"></canvas>
        </div>
    </div>
    <div class="chart-card" *ngIf="lineChartData">
        <h3>Average Transaction Volume ($)</h3>
        <div class="chart-container">
            <canvas baseChart [data]="lineChartData" [options]="chartOptions" type="line"></canvas>
        </div>
    </div>
</div>

<div class="charts-row">
    <div class="chart-card" *ngIf="doughnutChartData">
        <h3>User Distribution</h3>
        <div class="chart-container" style="height: 240px;">
            <canvas baseChart [data]="doughnutChartData" [options]="doughnutOptions" type="doughnut"></canvas>
        </div>
    </div>
    <div class="chart-card">
        <h3>Recent Registrations</h3>
        <div class="recent-list">
            <div class="recent-item" *ngFor="let user of recentUsers">
                <div class="user-avatar">{{ user.name.charAt(0).toUpperCase() }}</div>
                <div class="user-details">
                    <span class="name">{{ user.name }}</span>
                    <span class="email">{{ user.email }}</span>
                </div>
                <div class="user-meta">
                    <span class="role-badge">{{ user.role }}</span>
                    <span class="date">{{ user.date }}</span>
                </div>
            </div>

            <div *ngIf="recentUsers.length === 0"
                style="text-align: center; color: var(--color-text-muted); padding: 1rem;">
                No recent registrations
            </div>
        </div>
    </div>
</div>
