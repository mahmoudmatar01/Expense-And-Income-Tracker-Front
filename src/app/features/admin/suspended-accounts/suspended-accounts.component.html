<app-page-header title="Suspended Accounts" subtitle="Review and manage suspended users">
    <span style="font-size: 0.875rem; color: var(--color-danger); font-weight: 600;">{{ suspendedUsers.length }}
        suspended</span>
</app-page-header>

<app-data-table [columns]="columns" [data]="suspendedUsers" [searchable]="true"
    searchPlaceholder="Search suspended users..." [showActions]="true">
    <ng-template #rowActions let-row>
        <button class="btn btn-success btn-sm" (click)="reactivate(row)">
            <span class="material-icons" style="font-size: 16px;">check_circle</span>
            Reactivate
        </button>
    </ng-template>
</app-data-table>

<!-- Pagination Control -->
<div
    style="display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1rem; padding: 0 1rem;">
    <button class="btn-outline" (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
    <span style="font-size: 0.875rem;">Page {{ currentPage + 1 }} of {{ totalPages === 0 ? 1 : totalPages }}</span>
    <button class="btn-outline" (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">Next</button>
</div>
