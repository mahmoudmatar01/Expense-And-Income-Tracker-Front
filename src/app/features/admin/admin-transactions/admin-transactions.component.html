<app-page-header title="Transactions Monitoring" subtitle="Track all system-wide transactions"></app-page-header>

<div class="alert alert-error" *ngIf="errorMessage">
    <span class="material-icons alert-icon">error</span>
    <span>{{ errorMessage }}</span>
</div>

<div *ngIf="isLoading" style="text-align: center; padding: 3rem;">
    <span class="spinner"></span>
    <p style="margin-top: 1rem; color: var(--color-text-muted);">Loading transactions...</p>
</div>

<ng-container *ngIf="!isLoading && !errorMessage">
    <app-data-table [columns]="columns" [data]="transactions" [searchable]="true"
        searchPlaceholder="Search by user, category, or ID..." [filterOptions]="['INCOME', 'EXPENSE']"
        filterLabel="All Types" filterKey="type">
    </app-data-table>

    <!-- Pagination Control -->
    <div
        style="display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1rem; padding: 0 1rem;">
        <button class="btn-outline" (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
        <span style="font-size: 0.875rem;">Page {{ currentPage + 1 }} of {{ totalPages === 0 ? 1 : totalPages }}</span>
        <button class="btn-outline" (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">Next</button>
    </div>
</ng-container>
