<app-page-header title="Users Management" subtitle="Manage all platform users">
    <span style="font-size: 0.875rem; color: var(--color-text-muted); font-weight: 500;">{{ users.length }} total
        users</span>
</app-page-header>

<app-data-table [columns]="columns" [data]="users" [searchable]="true"
    searchPlaceholder="Search users by name or email..." [filterOptions]="['Parent', 'Child']" filterLabel="All Roles"
    filterKey="role" [showActions]="true">
    <ng-template #rowActions let-row>
        <div style="display: flex; gap: 0.25rem; justify-content: flex-end;">
            <button class="icon-btn" title="View" (click)="viewUser(row)">
                <span class="material-icons">visibility</span>
            </button>
            <button class="icon-btn" *ngIf="row.status === 'Active'" title="Suspend" (click)="suspendUser(row)">
                <span class="material-icons" style="color: var(--color-danger);">block</span>
            </button>
            <button class="icon-btn" *ngIf="row.status === 'Suspended'" title="Activate" (click)="activateUser(row)">
                <span class="material-icons" style="color: var(--color-success);">check_circle</span>
            </button>
            <button class="icon-btn" title="Delete" (click)="deleteUser(row)">
                <span class="material-icons" style="color: var(--color-danger);">delete_outline</span>
            </button>
        </div>
    </ng-template>
</app-data-table>

<!-- User Detail Modal -->
<app-modal [isOpen]="showUserModal" [title]="'User Profile'" (close)="showUserModal = false">
    <div *ngIf="selectedUser" style="display: flex; flex-direction: column; gap: 1rem;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div
                style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #635BFF, #8b85ff); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem;">
                {{ selectedUser.name.charAt(0) }}
            </div>
            <div>
                <h3 style="font-size: 1.125rem; font-weight: 600; color: var(--color-secondary);">{{ selectedUser.name
                    }}</h3>
                <p style="font-size: 0.875rem; color: var(--color-text-muted);">{{ selectedUser.email }}</p>
            </div>
        </div>
        <div
            style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem; background: var(--color-background); border-radius: var(--border-radius);">
            <div><span style="font-size: 0.75rem; color: var(--color-text-muted); display: block;">Role</span><strong>{{
                    selectedUser.role }}</strong></div>
            <div><span
                    style="font-size: 0.75rem; color: var(--color-text-muted); display: block;">Status</span><strong>{{
                    selectedUser.status }}</strong></div>
            <div><span
                    style="font-size: 0.75rem; color: var(--color-text-muted); display: block;">Transactions</span><strong>{{
                    selectedUser.transactions }}</strong></div>
            <div><span
                    style="font-size: 0.75rem; color: var(--color-text-muted); display: block;">Joined</span><strong>{{
                    selectedUser.joined }}</strong></div>
        </div>
        <div class="form-actions">
            <button class="btn-outline" (click)="showUserModal = false">Close</button>
            <button class="btn btn-primary" *ngIf="selectedUser.status === 'Active'"
                (click)="suspendUser(selectedUser); showUserModal = false">Suspend</button>
            <button class="btn btn-success" *ngIf="selectedUser.status === 'Suspended'"
                (click)="activateUser(selectedUser); showUserModal = false">Activate</button>
        </div>
    </div>
</app-modal>
