<app-page-header title="Transactions" subtitle="Track all your income and expenses"></app-page-header>

<app-data-table [columns]="columns" [data]="transactions" [searchable]="true" searchPlaceholder="Search transactions..."
    [filterOptions]="['INCOME', 'EXPENSE']" filterLabel="All Types" filterKey="type" [showActions]="false"
    [isLoading]="isLoading" emptyIcon="receipt_long" emptyTitle="No transactions yet"
    emptyMessage="Start by adding your first transaction.">
</app-data-table>

<!-- Pagination Control -->
<div class="pagination-bar">
    <button class="btn-outline" (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
    <span>Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button class="btn-outline" (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">Next</button>
</div>

<button class="fab" (click)="showModal = true" title="Add Transaction">
    <span class="material-icons">add</span>
</button>

<app-modal [isOpen]="showModal" title="Add Transaction" (close)="showModal = false">
    <div class="form-row">
        <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-control" [(ngModel)]="newTxn.type">
                <option value="INCOME">Income</option>
                <option value="EXPENSE">Expense</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Amount</label>
            <input class="form-control" type="number" [(ngModel)]="newTxn.amount" placeholder="0.00" />
        </div>
    </div>
    <div class="form-row">
        <div class="form-group" *ngIf="newTxn.type === 'EXPENSE'">
            <label class="form-label">Category (Required for Expense)</label>
            <select class="form-control" [(ngModel)]="newTxn.categoryId">
                <option [ngValue]="null">Select Category</option>
                <option *ngFor="let cat of categories" [ngValue]="cat.id">{{ cat.name }}</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Wallet</label>
            <select class="form-control" [(ngModel)]="newTxn.walletId">
                <option [ngValue]="null">Select Wallet</option>
                <option *ngFor="let wallet of wallets" [ngValue]="wallet.id">{{ wallet.name }}</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" [(ngModel)]="newTxn.description" placeholder="What was this for?" />
    </div>
    <div class="form-actions">
        <button class="btn-outline" (click)="showModal = false">Cancel</button>
        <button class="btn btn-primary" (click)="addTransaction()"
            [disabled]="!newTxn.walletId || !newTxn.amount || (newTxn.type === 'EXPENSE' && !newTxn.categoryId)">Add
            Transaction</button>
    </div>
</app-modal>
