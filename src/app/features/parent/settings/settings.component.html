<app-page-header title="Settings" subtitle="Manage your profile and preferences">
    <button class="btn btn-primary" (click)="save()">
        <span class="material-icons" style="font-size: 18px;">save</span> Save
    </button>
</app-page-header>

<div class="two-col-layout">
    <div class="chart-card">
        <h3>Profile Settings</h3>
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-control" [(ngModel)]="profile.name" />
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" [(ngModel)]="profile.email" />
        </div>
        <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" [(ngModel)]="profile.phone" />
        </div>
        <div class="form-group">
            <label class="form-label">Change Password</label>
            <input class="form-control" type="password" placeholder="New password" />
        </div>
    </div>

    <div class="chart-card">
        <h3>Notification Preferences</h3>
        <div style="display: flex; flex-direction: column; gap: 1.25rem; margin-top: 0.5rem;">
            <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                <input type="checkbox" [(ngModel)]="notifications.email"
                    style="width: 18px; height: 18px; accent-color: var(--color-primary);">
                <div>
                    <span style="font-weight: 500; font-size: 0.875rem;">Email Notifications</span>
                    <p style="font-size: 0.75rem; color: var(--color-text-muted);">Receive updates via email</p>
                </div>
            </label>
            <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                <input type="checkbox" [(ngModel)]="notifications.push"
                    style="width: 18px; height: 18px; accent-color: var(--color-primary);">
                <div>
                    <span style="font-weight: 500; font-size: 0.875rem;">Push Notifications</span>
                    <p style="font-size: 0.75rem; color: var(--color-text-muted);">Browser push notifications</p>
                </div>
            </label>
            <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                <input type="checkbox" [(ngModel)]="notifications.budgetAlerts"
                    style="width: 18px; height: 18px; accent-color: var(--color-primary);">
                <div>
                    <span style="font-weight: 500; font-size: 0.875rem;">Budget Alerts</span>
                    <p style="font-size: 0.75rem; color: var(--color-text-muted);">Alert when budget exceeds 80%</p>
                </div>
            </label>
            <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                <input type="checkbox" [(ngModel)]="notifications.childActivity"
                    style="width: 18px; height: 18px; accent-color: var(--color-primary);">
                <div>
                    <span style="font-weight: 500; font-size: 0.875rem;">Child Activity Alerts</span>
                    <p style="font-size: 0.75rem; color: var(--color-text-muted);">Notify on children's transactions</p>
                </div>
            </label>
        </div>
    </div>
</div>
