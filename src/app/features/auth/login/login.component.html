<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <span class="material-icons logo-icon">monetization_on</span>
                <h2>Expense Tracker</h2>
            </div>
            <p class="subtitle">Sign in to your account</p>
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">
            <span class="material-icons alert-icon">error</span>
            <span>{{ errorMessage }}</span>
        </div>

        <form (ngSubmit)="login()" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" [(ngModel)]="email" name="email" required
                    placeholder="name@company.com">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" [(ngModel)]="password" name="password" required
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading || !email || !password"
                [class.loading]="isLoading">
                <span class="btn-content" *ngIf="!isLoading">Sign in</span>
                <span class="btn-content" *ngIf="isLoading">
                    <span class="spinner"></span>
                    Signing in...
                </span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/register" class="text-primary">Sign up</a></p>
        </div>
    </div>
</div>
